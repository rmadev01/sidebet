services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sidebet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "3001:3001"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    depends_on:
      - postgres
      - auth
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    env_file:
      - .env
    depends_on:
      - backend
      - auth
    ports:
      - "5173:5173"

volumes:
  postgres-data:
